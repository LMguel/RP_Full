name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate syntax
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python -c "from app import app; print('Syntax OK')"

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST_KEY: ${{ secrets.EC2_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$EC2_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          echo "$EC2_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            -e "ssh -i /tmp/deploy_key" \
            backend/ \
            ubuntu@registra-ponto.duckdns.org:~/RP_Full/backend/

          ssh -i /tmp/deploy_key \
            ubuntu@registra-ponto.duckdns.org \
            'cd ~/RP_Full/backend && source venv/bin/activate && pip install -r requirements.txt -q && pkill -f gunicorn || true && sleep 2 && gunicorn -c config/gunicorn.py --bind 127.0.0.1:8000 --access-logfile /var/log/gunicorn/access.log --error-logfile /var/log/gunicorn/error.log --daemon app:app && sleep 3 && curl -sf http://localhost:8000/health'

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Summary
        run: |
          echo "Backend em producao: https://registra-ponto.duckdns.org"
