name: Deploy Frontend  # 2026-06-05

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/deploy-front.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: front
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: REGISTRA.PONTO
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy assets to S3 (cache imutável)
        working-directory: front
        run: |
          aws s3 sync dist/ s3://app-registra-ponto \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.json" \
            --exclude "sw.js" \
            --exclude "workbox-*.js"

      - name: Deploy entrypoints (sem cache)
        working-directory: front
        run: |
          aws s3 sync dist/ s3://app-registra-ponto \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "index.html" \
            --include "*.json"

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E34SUQ0BNKFXYE \
            --paths "/*"

      - name: Summary
        run: echo "✅ Frontend em produção: https://app.registraponto.app.br"
